<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style Encore</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#fafafa;
color:#333;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
background:white;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);
z-index:1000;
}

.logo{
font-size:28px;
font-weight:700;
letter-spacing:2px;
}

nav a{
margin-left:25px;
text-decoration:none;
color:#444;
font-weight:500;
}

.hero{

height:100vh;
background:url("https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=1600") center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.hero h1{
font-size:70px;
}

.hero p{
margin:20px;
font-size:20px;
}

.btn{
padding:15px 40px;
background:black;
color:white;
text-decoration:none;
display:inline-block;
border-radius:30px;
}

section{
padding:80px 8%;
}

.title{
text-align:center;
font-size:40px;
margin-bottom:50px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:350px;
object-fit:cover;
}

.card h3{
padding:20px;
}

.price{
padding:0 20px 20px;
font-size:22px;
font-weight:bold;
}

.newsletter{
background:#111;
color:white;
text-align:center;
padding:80px;
}

.newsletter input{
padding:15px;
width:300px;
border:none;
}

.newsletter button{
padding:15px 25px;
border:none;
background:white;
cursor:pointer;
}

footer{
background:#222;
color:white;
padding:40px;
text-align:center;
}

</style>
</head>

<body>

<header>

<div class="logo">Style Encore</div>

<nav>

<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Women</a>
<a href="#">Men</a>
<a href="#">Contact</a>

</nav>

</header>

<div class="hero">

<div>

<h1>Modern Fashion</h1>

<p>Discover your signature style.</p>

<a class="btn">Shop Now</a>

</div>

</div>

<section>

<h2 class="title">Featured Collection</h2>

<div class="grid">

<div class="card">

<img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b">

<h3>Elegant Dress</h3>

<div class="price">$69</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518">

<h3>Minimal Jacket</h3>

<div class="price">$89</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1483985988355-763728e1935b">

<h3>Luxury Outfit</h3>

<div class="price">$119</div>

</div>

</div>

</section>

<section class="newsletter">

<h2>Join Our Newsletter</h2>

<br>

<input placeholder="Email">

<button>Subscribe</button>

</section>

<footer>

©2026 Style Encore

</footer>

</body>
</html>
